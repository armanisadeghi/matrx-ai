databases:
- additional_schemas:
  - auth
  alias: main
  env_prefix: SUPABASE_MATRIX
  manager_config_overrides:
    ai_model:
      filter_fields:
      - name
      - common_name
      - provider
      - model_class
      - model_provider
      relations:
      - ai_provider
      - ai_model_endpoint
      - ai_settings
      - recipe_model
    compiled_recipe:
      filter_fields:
      - recipe_id
      - user_id
      - version
      include_core_relations: true
      include_filter_fields: true
      relations:
      - recipe
      - applet
    data_input_component:
      filter_fields:
      - options
      - component
      relations:
      - message_broker
      - broker
      - data_broker
  name: supabase_automation_matrix
- additional_schemas: []
  alias: external
  env_prefix: POSTGRES
  name: external_postgres
debug:
  debug: false
  info: false
  verbose: false
generate:
- database: supabase_automation_matrix
  include_tables:
  - cx_conversation
  - cx_messages
  - cx_agent_memory
  - cx_media
  - cx_request
  - cx_tool_call
  - cx_user_request
  - ai_model
  - tools
  - prompts
  - prompt_builtins
  - content_blocks
  - table_data
  - ai_provider
  - shortcut_categories
  - user_tables
  manager_flags:
    include_active_methods: false
    include_active_relations: false
    include_core_relations: true
    include_filter_fields: true
    include_or_not_methods: false
    include_to_dict_methods: false
    include_to_dict_relations: false
  schema: public
output:
  json: true
  python: true
  python_root: /Volumes/Samsung2TB/code/matrx-ai
  save_direct: true
  typescript: false
  typescript_root: /Volumes/Samsung2TB/code/matrx-ai/app
