name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so hatch-vcs can resolve version from git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Extract version from tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing version: $TAG"

      - name: Verify version matches __init__.py
        run: |
          INIT_VERSION=$(grep '^__version__ = "[0-9]' matrx_ai/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')
          TAG_VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "❌ Error: Git tag version ($TAG_VERSION) doesn't match __init__.py version ($INIT_VERSION)"
            exit 1
          fi
          echo "✅ Version verified: $INIT_VERSION"

      - name: Build package
        run: |
          uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
