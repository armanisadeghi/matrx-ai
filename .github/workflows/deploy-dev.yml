name: Deploy Development

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to development
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -f -X GET \
            "${{ secrets.COOLIFY_WEBHOOK_URL_DEV }}" \
            --max-time 30
        env:
          COOLIFY_WEBHOOK_URL_DEV: ${{ secrets.COOLIFY_WEBHOOK_URL_DEV }}
